name: tests-linux

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '20 2 * * *'

jobs:
  tests-pr:
    if: github.event_name != 'schedule'
    name: 'ubuntu-latest:python-${{ matrix.python-version }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-timeout

      - name: Build vplanet
        run: make opt

      - name: Run smoke tests
        timeout-minutes: 10
        run: |
          python -m pytest \
            tests/Conflicts/test_conflict.py \
            tests/Help/test_Help.py \
            tests/test_quantity.py \
            tests/Stellar/HZSingle/test_HZSingle.py \
            --tb=short -v --timeout=300 --junitxml=junit/test-results.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit/test-*.xml
          check_name: Test Results (ubuntu-latest py${{ matrix.python-version }})

  tests-nightly:
    if: github.event_name == 'schedule'
    name: 'ubuntu-latest:python-${{ matrix.python-version }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        id: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-timeout

      - name: Build vplanet
        run: make opt

      - name: Run smoke tests
        timeout-minutes: 10
        run: |
          python -m pytest \
            tests/Conflicts/test_conflict.py \
            tests/Help/test_Help.py \
            tests/test_quantity.py \
            tests/Stellar/HZSingle/test_HZSingle.py \
            --tb=short -v --timeout=300 --junitxml=junit/test-results.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit/test-*.xml
          check_name: Nightly Test Results (ubuntu-latest py${{ matrix.python-version }})
